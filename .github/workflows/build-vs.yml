name: Build Visual Studio VSIX

on:
  push:
    branches: [main]
    paths:
      - 'clients/vs/**'
      - '.github/workflows/build-vs.yml'
  pull_request:
    paths:
      - 'clients/vs/**'
  workflow_dispatch:

# Visual Studio extensions can only be built on Windows with MSBuild + the
# VS SDK. We run on the Microsoft-hosted `windows-2022` image, which already
# has Visual Studio 2022 Build Tools and MSBuild on PATH via setup-msbuild.

jobs:
  build:
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2
        with:
          nuget-version: '6.x'

      - name: Restore NuGet packages
        working-directory: clients/vs
        run: nuget restore devradar-vs.sln

      - name: Build VSIX (Release)
        working-directory: clients/vs
        run: |
          $log = "${{ runner.temp }}\msbuild.log"
          # CreateVsixContainer is now registered (via explicit Import of
          # Microsoft.VsSDK.targets in the csproj) but Microsoft.NET.Sdk
          # appears to overwrite PrepareForRunDependsOn AFTER the VSSDK
          # targets append to it, so a plain /t:Build doesn't trigger it.
          # Pass it as an explicit target after Build to force packaging.
          msbuild devradar-vs.sln /t:Build`;CreateVsixContainer /p:Configuration=Release /p:DeployExtension=false /p:Platform="Any CPU" /m /v:minimal /clp:ShowTimestamp 2>&1 | Tee-Object -FilePath $log
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::group::Last 200 lines of MSBuild output"
            Get-Content $log -Tail 200
            Write-Host "::endgroup::"
            # Promote each MSBuild error/warning line to a GitHub annotation
            # so the failure shows up on the run summary instead of needing
            # someone to download the artifact.
            Get-Content $log | Where-Object { $_ -match "\s(error|warning)\s[A-Z]+[0-9]+" } | Select-Object -First 25 | ForEach-Object {
              $line = $_.Trim()
              $level = if ($line -match "\serror\s") { "error" } else { "warning" }
              Write-Host "::$level::$line"
            }
            Write-Host "::error::MSBuild failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }
          Write-Host "::group::bin/ tree after build"
          if (Test-Path .\DevradarVS\bin) {
            Get-ChildItem -Recurse .\DevradarVS\bin | Select-Object FullName, Length | Format-Table -AutoSize | Out-String | Write-Host
          }
          Write-Host "::endgroup::"

      - name: Upload MSBuild log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: msbuild-log
          path: ${{ runner.temp }}\msbuild.log
          if-no-files-found: ignore

      - name: Locate VSIX
        id: vsix
        working-directory: clients/vs
        run: |
          # Promote bin/ and obj/ tree dump to annotations so we can see
          # exactly what MSBuild produced even without auth to download logs.
          foreach ($d in @('.\DevradarVS\bin', '.\DevradarVS\obj')) {
            if (Test-Path $d) {
              Write-Host "::warning::TREE $d :"
              Get-ChildItem -Recurse $d | ForEach-Object {
                $rel = $_.FullName.Substring((Resolve-Path .).Path.Length)
                Write-Host "::warning::  $($_.Length.ToString().PadLeft(10)) $rel"
              }
            } else {
              Write-Host "::warning::TREE $d : (does not exist)"
            }
          }
          $vsix = Get-ChildItem -Recurse -Filter *.vsix -Path . | Select-Object -First 1
          if (-not $vsix) {
            Write-Host "::error::No .vsix produced anywhere under clients/vs after the build."
            exit 1
          }
          Write-Host "Found: $($vsix.FullName)"
          "vsix_path=$($vsix.FullName)" >> $env:GITHUB_OUTPUT
          "vsix_name=$($vsix.Name)"     >> $env:GITHUB_OUTPUT

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: devradar-vsix
          path: ${{ steps.vsix.outputs.vsix_path }}
          if-no-files-found: error

      - name: Summary
        run: |
          "### devradar VSIX built"           >> $env:GITHUB_STEP_SUMMARY
          ""                                  >> $env:GITHUB_STEP_SUMMARY
          "Download from the **Artifacts** section at the top of this run."        >> $env:GITHUB_STEP_SUMMARY
          "Then install with **Double-click the .vsix** on a Windows machine."     >> $env:GITHUB_STEP_SUMMARY
          ""                                  >> $env:GITHUB_STEP_SUMMARY
          "Filename: ${{ steps.vsix.outputs.vsix_name }}"  >> $env:GITHUB_STEP_SUMMARY
